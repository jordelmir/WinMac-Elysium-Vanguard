name: Build & Test WinMac Elysium Vanguard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      
      - name: Show Swift version
        run: swift --version
      
      - name: Resolve dependencies
        run: swift package resolve
      
      - name: Build (Debug)
        run: swift build
      
      - name: Run Tests
        run: swift test
      
      - name: Build (Release)
        run: swift build -c release --product elysium-app
      
      - name: Package .app Bundle
        run: |
          chmod +x Scripts/build_release_app.sh
          ./Scripts/build_release_app.sh
      
      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinMac-Elysium-Vanguard-macOS
          path: build/Release/WinMac Elysium Vanguard.app
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      
      - name: Build Release
        run: |
          swift build -c release --product elysium-app
          chmod +x Scripts/build_release_app.sh
          ./Scripts/build_release_app.sh
      
      - name: Compress App Bundle
        run: |
          cd build/Release
          zip -r "../../WinMac-Elysium-Vanguard-macOS.zip" "WinMac Elysium Vanguard.app"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "WinMac Elysium Vanguard v${{ github.run_number }}"
          files: WinMac-Elysium-Vanguard-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
